apiVersion: v1
kind: PersistentVolume
metadata:
  name: flink-checkpoints-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/local/k8sproj/flink-checkpoints
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-checkpoints-pvc
  namespace: data-platform
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: manual
  resources:
    requests:
      storage: 5Gi
  volumeName: flink-checkpoints-pv
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: data-platform
spec:
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: rpc
      port: 6123
    - name: blob
      port: 6124
    - name: ui
      port: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
    spec:
      initContainers:
        - name: prepare-checkpoints
          image: busybox:1.37
          command: ["sh", "-c", "chmod -R 0777 /opt/flink/checkpoints"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: checkpoints
              mountPath: /opt/flink/checkpoints
        - name: wait-for-services
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z kafka 9092 && nc -z iceberg-rest 8181 && nc -z minio 9000; do sleep 5; done"]
      containers:
        - name: jobmanager
          image: mualanhlung017/ai-data-pipeline:1.0.2
          imagePullPolicy: IfNotPresent
          args: ["standalone-job", "--job-classname", "vn.muoilt.pipeline.MedallionPipelineJob"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: ICEBERG_REST_URI
              value: http://iceberg-rest:8181
            - name: ICEBERG_WAREHOUSE
              value: s3://iceberg-warehouse
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_REGION
              value: us-east-1
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                jobmanager.memory.process.size: 1024m
                taskmanager.memory.process.size: 1280m
                taskmanager.numberOfTaskSlots: 4
                parallelism.default: 1
                execution.checkpointing.dir: file:///opt/flink/checkpoints
                execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
          ports:
            - name: rpc
              containerPort: 6123
            - name: blob
              containerPort: 6124
            - name: ui
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /overview
              port: ui
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 1280Mi
          volumeMounts:
            - name: checkpoints
              mountPath: /opt/flink/checkpoints
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: flink-checkpoints-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      initContainers:
        - name: prepare-checkpoints
          image: busybox:1.37
          command: ["sh", "-c", "chmod -R 0777 /opt/flink/checkpoints"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: checkpoints
              mountPath: /opt/flink/checkpoints
        - name: wait-for-jobmanager
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z flink-jobmanager 6123; do sleep 5; done"]
      containers:
        - name: taskmanager
          image: mualanhlung017/ai-data-pipeline:1.0.2
          imagePullPolicy: IfNotPresent
          args: ["taskmanager"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: ICEBERG_REST_URI
              value: http://iceberg-rest:8181
            - name: ICEBERG_WAREHOUSE
              value: s3://iceberg-warehouse
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_REGION
              value: us-east-1
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                jobmanager.memory.process.size: 1024m
                taskmanager.memory.process.size: 1280m
                taskmanager.numberOfTaskSlots: 4
                parallelism.default: 1
                execution.checkpointing.dir: file:///opt/flink/checkpoints
                execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
          resources:
            requests:
              cpu: 300m
              memory: 1280Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          volumeMounts:
            - name: checkpoints
              mountPath: /opt/flink/checkpoints
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: flink-checkpoints-pvc
