apiVersion: v1
kind: PersistentVolume
metadata:
  name: nifi-input-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/local/k8sproj/nifi-input
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nifi-input-pvc
  namespace: data-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
  volumeName: nifi-input-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nifi-conf-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/local/k8sproj/nifi-conf
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nifi-conf-pvc
  namespace: data-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
  volumeName: nifi-conf-pv
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nifi-sample-data
  namespace: data-platform
data:
  sample.txt: |
    DU LIEU AI CAN DUOC LAM SACH
      Dong thu hai co nhieu    khoang trang

    KAFKA FLINK ICEBERG MINIO
---
apiVersion: v1
kind: Service
metadata:
  name: nifi
  namespace: data-platform
spec:
  selector:
    app: nifi
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      initContainers:
        - name: prepare-conf
          image: apache/nifi:1.28.0
          command:
            - /bin/bash
            - -ec
            - cp -an /opt/nifi/nifi-current/conf/. /mnt/conf/ && chown -R 1000:1000 /mnt/conf
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: conf
              mountPath: /mnt/conf
        - name: seed-input
          image: busybox:1.37
          command: ["sh", "-c", "cp -n /sample/sample.txt /input/sample.txt || true; chown -R 1000:1000 /input"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: input
              mountPath: /input
            - name: sample
              mountPath: /sample
      containers:
        - name: nifi
          image: apache/nifi:1.28.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"
            - name: NIFI_JVM_HEAP_INIT
              value: 512m
            - name: NIFI_JVM_HEAP_MAX
              value: 1024m
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          volumeMounts:
            - name: input
              mountPath: /opt/nifi/input
            - name: conf
              mountPath: /opt/nifi/nifi-current/conf
      volumes:
        - name: input
          persistentVolumeClaim:
            claimName: nifi-input-pvc
        - name: sample
          configMap:
            name: nifi-sample-data
        - name: conf
          persistentVolumeClaim:
            claimName: nifi-conf-pvc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nifi-bootstrap
  namespace: data-platform
data:
  nifi_bootstrap.py: |
    # Script content is synchronized from scripts/nifi_bootstrap.py by kustomize.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nifi-bootstrap
  namespace: data-platform
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: python:3.12-alpine
          command: ["python", "/scripts/nifi_bootstrap.py"]
          env:
            - name: NIFI_URL
              value: http://nifi:8080/nifi-api
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: nifi-bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: nifi-nodeport
  namespace: data-platform
spec:
  type: NodePort
  selector:
    app: nifi
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
