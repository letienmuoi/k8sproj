apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      initContainers:
        - name: prepare-catalog-volume
          image: busybox:1.37
          command: ["sh", "-c", "chmod 0777 /catalog"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: catalog
              mountPath: /catalog
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:1.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_REGION
              value: us-east-1
            - name: CATALOG_WAREHOUSE
              value: s3://iceberg-warehouse
            - name: CATALOG_URI
              value: jdbc:sqlite:file:/catalog/iceberg_rest
            - name: CATALOG_IO__IMPL
              value: org.apache.iceberg.aws.s3.S3FileIO
            - name: CATALOG_S3_ENDPOINT
              value: http://minio:9000
            - name: CATALOG_S3_PATH__STYLE__ACCESS
              value: "true"
          ports:
            - name: http
              containerPort: 8181
          readinessProbe:
            httpGet:
              path: /v1/config
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: catalog
              mountPath: /catalog
      volumes:
        - name: catalog
          persistentVolumeClaim:
            claimName: iceberg-warehouse-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: data-platform
spec:
  selector:
    app: iceberg-rest
  ports:
    - name: http
      port: 8181
      targetPort: http
